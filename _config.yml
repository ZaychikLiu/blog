# Hexo site configuration
# Docs: https://hexo.io/docs/configuration

# Site
title: Zaychik's Blog
subtitle:
description: Notes on research, engineering, and everyday learning.
author: Zaychik Liu
language: en
timezone: Asia/Shanghai

# URL
# Default target: https://zaychikliu.github.io/blog/
# If you use a custom domain root, set url to that domain and root to /
url: https://zaychikliu.github.io/blog
root: /blog/
permalink: :year/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: post
  exclude:
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

# Markdown and code highlighting
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:
  wrap: true
  hljs: false
prismjs:
  enable: false

# Category & tag
default_category: notes
category_map:
tag_map:

# Date / time format
date_format: DD/MMM/YYYY
time_format: HH:mm:ss
updated_option: empty

# Pagination
per_page: 10
pagination_dir: page

index_generator:
  per_page: 10

archive_generator:
  per_page: 20
  yearly: true
  monthly: true

category_generator:
  per_page: 10

tag_generator:
  per_page: 10

# Theme
theme: icarus

# RSS, exposed at /blog/atom.xml
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit:
  content_limit_delim: <!-- more -->
  order_by: -date

# Optional GitHub emoji support
githubEmojis:
  className: not-gallery-item

# SEO
sitemap:
  path: sitemap.xml

robotstxt:
  useragent: "*"
  allow:
    - /
  sitemap: https://zaychikliu.github.io/blog/sitemap.xml

# Optional advanced features injected by scripts/advanced-features.js.
# Keep empty values until you create the corresponding third-party service.
advanced:
  reading_progress: true
  heading_anchors: true
  share:
    enabled: true
    platforms:
      - x
      - linkedin
      - email
      - copy
  popular_posts:
    enabled: true
    title: Popular Posts
    posts:
      - title: Hello Hexo Icarus
        url: /2026/hello-hexo-icarus/
      - title: Research Note Template
        url: /2026/research-note-template/
  toc:
    enabled: true
    title: Contents
    min_headings: 1
  comments:
    enabled: true
    # provider can be "giscus" or "utterances".
    provider: utterances
    # Giscus needs repo, repo_id, category, and category_id.
    # Get them from https://giscus.app after enabling GitHub Discussions.
    repo: ZaychikLiu/blog
    repo_id:
    category: General
    category_id:
    mapping: pathname
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: bottom
    theme: light
    lang: en
    # Utterances only needs repo.
    utterances_repo: ZaychikLiu/blog
    utterances_issue_term: pathname
    utterances_theme: github-light
  analytics:
    google_analytics:
      measurement_id:
    plausible:
      domain:
      script_url: https://plausible.io/js/script.js
  edit_link:
    enabled: false
    label: Edit this page
    repository: https://github.com/ZaychikLiu/blog
    branch: main

# Optional deployer. GitHub Actions is preferred, but this works after gh/git auth.
deploy:
  type: git
  repository: git@github.com:ZaychikLiu/blog.git
  branch: gh-pages

marked:
  gfm: true
  breaks: false
  mangle: false
  headerIds: true
